<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Quickly detect document boundaries from a live camera stream and crop the document out before normalizing it further through perspective correction, deskewing, and more."
    />
    <meta name="keywords" content="camera based quadrilateral detection and normalization" />
    <title>Detect the boundary of a document and normalize it</title>
    <script src="https://cdn.jsdelivr.net/npm/dynamsoft-capture-vision-bundle@2.4.2200/dist/dcv.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dynamsoft-camera-enhancer@4.1.0-beta-202410310121/dist/dce.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dynamsoft-document-viewer@latest/dist/ddv.css" />
    <script src="https://cdn.jsdelivr.net/npm/dynamsoft-document-viewer@latest/dist/ddv.js"></script>
    <script src="./dist/mobile-web-capture.js"></script>
  </head>

  <body>
    <h1 style="font-size: 1.5em">Detect the boundary of a document and normalize it</h1>
    <button id="start-detecting">Start Scanning</button>
    <button id="start-preview">Start Preview</button>
    <button id="start-normalizer">Start Normalizer</button>
    <button id="start-core-workflow">Start Capturing Image</button>
    <button id="start-library">Start Library</button>
    <button id="start-page">Start Page View</button>

    <div id="camera-view-container" style="margin-top: 10px; height: 80vh; display: none"></div>
    <div id="preview-view-container" style="display: none; height: 80vh"></div>
    <div id="normalizer-view-container" style="display: none; height: 80vh"></div>
    <div id="library-view-container" style="height: 80vh"></div>
    <div id="document-view-container" style="height: 80vh"></div>
    <div id="page-view-container" style="height: 80vh"></div>
    <div id="normalized-result"></div>

    <script type="module">
      // Page Elements
      const cameraViewContainer = document.querySelector("#camera-view-container");
      const normalizerViewContainer = document.querySelector("#normalizer-view-container");
      const previewContainer = document.querySelector("#preview-view-container");

      const startDetectingBtn = document.querySelector("#start-detecting");
      const startPreviewBtn = document.querySelector("#start-preview");
      const startNormalizerBtn = document.querySelector("#start-normalizer");
      const startWorkflowBtn = document.querySelector("#start-core-workflow");

      const libraryContainer = document.querySelector("#library-view-container");
      const documentContainer = document.querySelector("#document-view-container");
      const pageContainer = document.querySelector("#page-view-container");

      const startLibraryBtn = document.querySelector("#start-library");
      const startPageBtn = document.querySelector("#start-page");

      const normalizedResult = document.querySelector("#normalized-result");

      const uploadToServer = async (pdfBlob) => {
        try {
          // Configuration
          const BASE_URL = "https://tst.dynamsoft.com/temp/collect/mwc-server-test";
          const fileName = `doc_${Date.now()}.pdf`;

          // Create form data
          const formData = new FormData();
          formData.append("RemoteFile", pdfBlob, fileName);
          formData.append("filename", fileName);
          formData.append("SessionID", "MWC");

          // Upload file
          const response = await fetch(`${BASE_URL}/SaveToFileEx.aspx`, {
            method: "POST",
            body: formData,
          });

          const responseText = await response.text();

          if (!responseText || !responseText.includes("UploadedRealFileName")) {
            throw new Error("Invalid server response");
          }

          const serverFile = responseText.match(/UploadedRealFileName:(\d+)\\(.+)$/);
          if (!serverFile) {
            throw new Error("Failed to parse server response");
          }

          const [, uploadTime, serverFileName] = serverFile;
          const downloadUrl = `${BASE_URL}/online_demo_download.aspx?ImageName=${encodeURIComponent(
            `${uploadTime}\\${serverFileName}`
          )}`;

          // NOTE: Ensure the object returned contains status, fileName, and downloadUrl
          return {
            status: "success",
            fileName: serverFileName,
            downloadUrl,
            uploadTime,
          };
        } catch (error) {
          console.error("Upload failed:", error);
          return {
            status: "failed",
            fileName: "",
          };
        }
      };

      // Initialize MWC
      const mwc = new MobileWebCapture({
        license: "DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9",
        cameraViewContainer: cameraViewContainer,
        scanResultViewConfig: {
          container: previewContainer,
        },
        documentNormalizerViewConfig: {
          container: normalizerViewContainer,
        },
        libraryViewConfig: {
          container: libraryContainer,
          uploadDocument: uploadToServer,
        },
        documentViewConfig: {
          container: documentContainer,
        },
        pageViewConfig: {
          container: pageContainer,
        },
      });
      const { scannerView, normalizerView, scanResultView } = await mwc.initialize();

      // Add results
      let result = null;
      startDetectingBtn.addEventListener("click", async () => {
        result = await scannerView.scanImage();
        normalizedResult.append(result.normalizedImageResult.toCanvas());
      });

      startPreviewBtn.addEventListener("click", async () => {
        result = await scanResultView.showPreview();
        normalizedResult.append(result.normalizedImageResult.toCanvas());
      });

      startNormalizerBtn.addEventListener("click", async () => {
        result = await normalizerView.showEditor();

        normalizedResult.append(result.toCanvas());
      });

      startWorkflowBtn.addEventListener("click", async () => {
        try {
          const result = await mwc.startImageCapture();
          console.log("Capture completed:", result);

          if (result.success) {
            const normalizedImage = result.normalizedImageResult;
            normalizedResult.append(normalizedImage.toCanvas());
          }
        } catch (error) {
          console.error("Capture failed:", error);
        }
      });

      startPageBtn.addEventListener("click", async () => {
        try {
          await mwc.launch("library");
        } catch (error) {
          console.error("Capture failed:", error);
        }
      });
    </script>
  </body>
</html>
