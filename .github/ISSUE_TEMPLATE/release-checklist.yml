# sanitize:file
name: Release Checklist
description: This is the full list of tasks required for a release.
title: "Release version vX.y.z"
labels: ["build", "release"]
body:
  - type: textarea
    attributes:
      label: Release Checklist
      value: |
        - [ ] 1. Check release notes, using git history where possible
        - [ ] 2. Check README formatting in the development repository (including nested READMEs); note that the `npm` website does not render GitHub alerts but our documentation site does, so they should be stripped out for the READMEs only
        - [ ] 3. Deploy beta release to internal `npm` repository (`https://npm.scannerproxy.com:802`)
          - [ ] 3.1. Create beta releases with git branches and tags in the development repository
            - 3.1.1. Create a release branch from the main branch of the development repository for version `vX.Y.z beta a` with beta versioning: `git checkout -b release/vX.Y/vX.Y.z-beta{4 digit year}{two digit month}{two digit date}{4 digit a}`, e.g. `git checkout -b release/vX.Y/vX.Y.z-beta202010290001` for the first beta release on 2020 October 29th (the beta number `a` resets every day) - some source code needs to be changed for beta publishing only
            - 3.1.2. Replace regular CDN links (e.g. `https://cdn.jsdelivr.net/npm/`) with links to internal the `npm` repository (e.g. `https://npm.scannerproxy.com:802/cdn/`), e.g. `https://cdn.jsdelivr.net/npm/dynamsoft-mrz-scanner@3.0.3-beta-202509150001/dist/mrz-scanner.ui.html` -> `https://npm.scannerproxy.com:802/cdn/dynamsoft-mrz-scanner@3.0.3-beta-202509150001/dist/mrz-scanner.ui.html`
            - 3.1.3. Replace the version from the intended `vX.Y.z` with beta versioning where necessary, e.g. `package.json`
            - 3.1.4. Run `npm install` and `npm run build`
            - 3.1.5. Verify that the build works, samples work, framework samples work, etc. **using local resources** (testing the internal `npm` repository comes in step 3.3)
            - 3.1.6. Commit changes with message: `git commit -am "release v{beta version}`
            - 3.1.7. Create a signed git tag with beta versioning: `git tag -a v{beta version} -m "{product name} SDK v{beta version}" -s`
            - 3.1.8. Push the new beta branch and beta tag to the development repository: `git push {remote name} -u HEAD`, `git push origin tag v{beta version}`
          - [ ] 3.2. Publish to the internal `npm` repository from the beta branch
            - 3.2.1. First time set-up: create an npmjs account, and run `npm adduser` to add the account, then log in to the internal repository with `npm login --registry https://npm.scannerproxy.com:802/` (verify login with `npm whoami --registry https://npm.scannerproxy.com:802/`)
            - 3.2.2. While on the beta branch, publish to the internal repository with `npm publish --registry https://npm.scannerproxy.com:802`, and check status on `https://npm.scannerproxy.com:802/-/web/detail/@{package name}`
          - [ ] 3.3. Verify and test the package on the internal `npm` repository; any changes require fix commits in the main branch (never merging the beta release branches to the main branch), and then repeating the beta release branch steps in 3.1 with a new beta version
            - 3.3.1. Verify readme content and formatting on web page
            - 3.3.2. Test that the package works, samples work, framework samples work, etc. when loading the SDK from the internal repository (use `npm install {package name}@{beta version} --registry https://npm.scannerproxy.com:802/` when testing framework samples)
          - [ ] 3.4. Update the security audit portion of the change request management report
            - 3.4.1. Run local code scanning on the main branch with the local code scanning automation, then add the resulting SARIF report and HTML report summary to the audit
            - 3.4.2. Run `npm audit` on the main branch and add the result to the audit
        - [ ] 4. Create beta release in the production repository and deploy them to `npm`
          - [ ] 4.1. Create a **release branch** from main branch of the production repository for version `vX.Y.z`: `git checkout -b release/vX.y/vX.Y.z`
          - [ ] 4.2. Copy over code from the **development repository main branch** to the **production repository release branch**; some code is specific to the development repository and should not be copied over, including but **not limited to**:
            - 4.2.1. The distributables (development repositories track the distributables)
            - 4.2.2. Metadata such as `package-lock.json` that should be regenerated in the production repository
            - 4.2.3. Internal configurations like the `.npmrc` file pointing to the internal `npm` repository, and the `publishConfig` property in `package.json` also pointing there
            - 4.2.4. Repository-specific data like GitHub issue templates
          - [ ] 4.3. Install and build the SDK with `npm install` and `npm run build`
          - [ ] 4.4. Create a beta release by repeating steps in 3.1, but create the beta branch by branching from the **release branch of the production repository** (increment the beta version `a` to not collide with versions from the development repository)
          - [ ] 4.5. Create a beta release for GitHub and `npm` by creating a **GitHub pre-release** with release notes for the beta releases, and set the previous release to compare to as the last official release (the GitHub action to publish on `npm` triggers on making any GitHub releases)
        - [ ] 5. Repeat testing steps in 3.3; if any discrepancies were found, make fix commits in the **production repository release branch**, then repeat the release beta testing steps in 4
        - [ ] 6. Receive approval for the change request management report according to the Internal Change Management Process and GitHub Security Baseline Policy before proceeding for regular releases
          - 6.1. If a draft change request was already accepted, and a small amendment was created after the fact, then update the change request and get approval from the secondary change manager before proceeding
        - [ ] 7. Merge the release branch to the main branch
        - [ ] 8. Create official release and deploy the official release package to `npmjs` by repeating step 4.5, but marking it as an official release
        - [ ] 9. If there were any fixes made in steps 5-6, backport them to the development repository main branch
          - [ ] 9.1. Create a signed tag on the main branch with `git tag -a vX.Y.z -m "{product name} SDK vX.Y.z" -s`
          - [ ] 9.2. **Demo branches** for online demos may have source code customizations, so backport changes based on the diffs between tags on the main branch
        - [ ] 10. Update and deploy online hosted demo from the demo branch in the development repository
        - [ ] 11. Post a release announcement in the product teams channel
        - [ ] 12. Clean up release artifacts, pull requests, branches, etc.
