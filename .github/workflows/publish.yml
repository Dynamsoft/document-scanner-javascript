name: Publish Package
permissions:
  contents: read

on:
  release:
    types: [created]
  # Optionally enable manual workflow runs
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GIT_PAT }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

        # GitHub renders `> [!NOTE]` blocks as styled callouts; npm shows the raw
              # `[!NOTE]` marker instead. Convert the marker to a plain bold label
              # (`> **Note**`) so the published README reads well. Runs on the
              # checked-out copy only and never committed, so the repo source keeps its
              # GitHub admonitions.
      - name: Strip GFM admonitions from README (npm only)
        run: |
          sed -i -E 's/^([[:space:]]*>)[[:space:]]*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\][[:space:]]*$/\1 **\L\u\2**/Ig' README.md
        
      - name: Publish to npm
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PAT }}
