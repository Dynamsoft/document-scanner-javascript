name: CI

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  Build-Demo:
    # The type of runner that the job will run on
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Get Source
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GIT_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: samples/demo/package-lock.json

      - name: Install deps and build demo
        working-directory: samples/demo
        run: |
          npm ci
          # Vite-builds the demo: bundles src/*.ts, copies DCV bundle and
          # data alongside the JS, and emits a self-contained
          # samples/demo/dist/ ready to upload as-is.
          npm run build

      - name: Prepare Files
        run: |
          mkdir -p deploy
          # The Vite-built demo is self-contained: HTML, bundled JS, CSS,
          # static assets, and the SDK runtime resources colocated.
          cp -r samples/demo/dist/* deploy/

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_DEMO_SERVER }}
          username: ${{ secrets.FTP_DEMO_USERNAME }}
          password: ${{ secrets.FTP_DEMO_PASSWORD }}
          port: 21
          local-dir: ./deploy/
          server-dir: /Demo.dynamsoft.com/document-scanner/
