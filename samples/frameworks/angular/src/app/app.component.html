<div class="mds-hello-world-page">
	<div class="mds-title">
		<h2 class="mds-title-text">Hello World for Angular</h2>
	</div>
	<div class="mds-result-container">
		@if (result().image) {
			<img class="result-img" [src]="result().image" alt="scanned document" />
		}
		@if (result().message) {
			<div class="result-data">{{ result().message }}</div>
		}
	</div>
</div>
