<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamsoft Document Scanner Demo</title>
    <script src="../dist/dds.bundle.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
      }

      h1,
      h2 {
        text-align: center;
        margin: 20px 0;
      }

      #results {
        margin: 20px auto;
        max-width: 90%;
        padding: 10px;
        border: 2px dashed #ccc;
        background-color: #fff;
        height: 75vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #results canvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border: 1px solid #ddd;
      }

      .scanner-button {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        background-color: #fe814a;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      .scanner-button:hover {
        opacity: 0.8;
      }

      .scanner-button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>

  <body>
    <h1 style="font-size: large">Dynamsoft Document Scanner</h1>
    <div id="container">
      <div id="results">
        <div id="placeholder-content">
          <h2>No Document Scanned</h2>
          <p style="color: #666; font-size: 1rem; text-align: center">Scan a document to see the results here.</p>
        </div>
        <button id="scan-button" class="scanner-button">Start New Scan</button>
      </div>
    </div>

    <script type="module">
      // Button and results container references
      const scanButton = document.getElementById("scan-button");
      const resultContainer = document.getElementById("results");
      const placeholderContent = document.getElementById("placeholder-content");

      // Initialize the Dynamsoft Document Scanner
      const documentScanner = new Dynamsoft.DocumentScanner({
        //license: "YOUR_LICENSE_KEY_HERE",
        license:
          "DLS2eyJoYW5kc2hha2VDb2RlIjoiMjM0ODEwLXIxNzM2Mjk4NjI1IiwibWFpblNlcnZlclVSTCI6Imh0dHBzOi8vbWx0cy5keW5hbXNvZnQuY29tLyIsIm9yZ2FuaXphdGlvbklEIjoiMjM0ODEwIiwic3RhbmRieVNlcnZlclVSTCI6Imh0dHBzOi8vc2x0cy5keW5hbXNvZnQuY29tLyIsImNoZWNrQ29kZSI6MTc4MzcwMDY2MX0=",
      });

      // Function to initialize and launch the scanner
      async function launchScanner() {
        try {
          // Disable the button to prevent multiple launches
          scanButton.disabled = true;
          scanButton.innerText = "Scanning...";

          // Launch the scanner and wait for the result
          const result = await documentScanner.launch();
          console.log(result);

          // Clear the result container and display the scanned result as a canvas
          if (result?.correctedImageResult) {
            resultContainer.innerHTML = ""; // Clear placeholder content
            const canvas = result.correctedImageResult.toCanvas();
            resultContainer.appendChild(canvas);

            scanButton.remove();
            document.querySelector("#container").appendChild(scanButton);
          } else {
            placeholderContent.innerHTML = "<p>No image scanned. Please try again.</p>";
          }
        } catch (error) {
          // Handle errors
          console.error("Error during document scanning:", error);
          placeholderContent.innerHTML = `
            <p style="color: red; text-align: center;">
              An error occurred while scanning the document. Please check the console for details.
            </p>`;
        } finally {
          // Re-enable the button after scanning
          scanButton.disabled = false;
          scanButton.innerText = "Start New Scan";
        }
      }

      // Attach the click event listener to the button
      scanButton.addEventListener("click", launchScanner);
    </script>
  </body>
</html>
