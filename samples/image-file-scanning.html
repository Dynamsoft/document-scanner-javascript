<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dynamsoft Mobile Document Scanner - Image File Scanning</title>
		<style>
			body {
				font-family: system-ui, sans-serif;
				padding: 20px;
				max-width: 800px;
				margin: 0 auto;
			}
			h1 {
				margin-bottom: 20px;
			}
			input[type="file"] {
				margin-bottom: 20px;
			}
			#results canvas {
				width: 100%;
				height: auto;
			}
		</style>
	</head>
	<body>
		<h1>Scan an Existing Image</h1>
		<input type="file" id="initialFile" accept="image/png,image/jpeg,image/jpg" />
		<div id="results"></div>

		<script type="module">
			import { DocumentScanner } from "../dist/dds.bundle.esm.js";

			const resultContainer = document.querySelector("#results");

			const documentScanner = new DocumentScanner({
				license: "YOUR_LICENSE_KEY_HERE",
				// Self-host the DCV engine bundle + runtime data from the root dev
				// server's /public (mirrored there by the root vite config).
				engineResourcePaths: {
					dcvBundle: "/dynamsoft-capture-vision-bundle/dist",
					dcvData: "/dynamsoft-capture-vision-data",
				},
				scannerViewConfig: {
					cameraEnhancerUIPath: "../dist/document-scanner.ui.xml",
				},
			});

			// Pass a file to launch() to scan an existing image instead of the camera.
			document.getElementById("initialFile").onchange = async function () {
				try {
					const files = Array.from(this.files || []);
					if (!files.length) return;

					const result = await documentScanner.launch(files[0]);
					if (result?.correctedImageResult) {
						resultContainer.innerHTML = "";
						resultContainer.appendChild(result.correctedImageResult.toCanvas());
					} else {
						resultContainer.innerHTML = "<p>No image scanned. Please try again.</p>";
					}
				} catch (ex) {
					console.error("File scan error:", ex);
					const p = document.createElement("p");
					p.textContent = `Error: ${ex?.message || ex}`;
					resultContainer.replaceChildren(p);
				}
			};
		</script>
	</body>
</html>
