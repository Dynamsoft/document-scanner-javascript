<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="data:," />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamsoft Document Scanner - Hello World</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/dynamsoft-document-scanner@1.3.1/dist/dds.bundle.js"></script> -->
    <!-- To use locally: -->
    <script src="../../dist/dds.bundle.js"></script>
  </head>

  <body>
    <h1 style="font-size: large">Dynamsoft Document Scanner</h1>
    <div id="results"></div>

    <script>
      const resultContainer = document.querySelector("#results");

      // Initialize the Dynamsoft Document Scanner
      const documentScanner = new Dynamsoft.DocumentScanner({
        license: "YOUR_LICENSE_KEY_HERE",
        scannerViewConfig: {
          cameraEnhancerUIPath: "../../dist/document-scanner.ui.html", // Use local UI file
          enableAutoCropMode: true,
          enableSmartCaptureMode: true,
          showSubfooter: false, // Hide the Detect Borders, Smart Capture, and Auto Crop buttons
        },
        showCorrectionView: false, // Optional: skip correction view after each scan
        showResultView: false, // Optional: skip result view after each scan
        enableContinuousScanning: true,
        onDocumentScanned: async (result) => {
          // Process each scanned document
          const canvas = result.correctedImageResult.toCanvas();
          document.getElementById("results").appendChild(canvas);
        },
        onThumbnailClicked: async (result) => {
          // Optional: handle thumbnail click event
          console.log('Thumbnail clicked', result);
        }
      });
      (async () => {
        // Launch the scanner and wait for the result
        const result = await documentScanner.launch();
      })();
    </script>
  </body>
  <style>
    #results canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</html>
